name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: backend-cloudrun-${{ github.ref }}
  cancel-in-progress: false

env:
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || 'producto-backend' }}
  IMAGE_NAME: producto-backend

jobs:
  deploy:
    if: github.ref_name == 'main' && !contains(github.event.head_commit.message || '', '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version bump
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('level', '${{ inputs.version_bump }}');
              return;
            }

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const mergedPr = prs.data.find((pr) => pr.merged_at && pr.base.ref === 'main');
            if (!mergedPr) {
              core.notice('No se encontro una PR asociada al push en main; se usara patch.');
              core.setOutput('level', 'patch');
              return;
            }

            const labels = mergedPr.labels.map((label) => label.name.toLowerCase());
            const hasMajor = labels.some((label) => ['major', 'semver:major', 'version:major'].includes(label));
            const hasMinor = labels.some((label) => ['minor', 'semver:minor', 'version:minor'].includes(label));
            const hasPatch = labels.some((label) => ['patch', 'semver:patch', 'version:patch'].includes(label));

            if (hasMajor) core.setOutput('level', 'major');
            else if (hasMinor) core.setOutput('level', 'minor');
            else if (hasPatch) core.setOutput('level', 'patch');
            else core.setFailed('La PR debe tener un label de version: major, minor o patch.');

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          LEVEL="${{ steps.bump.outputs.level }}"

          LATEST_TAG="$(git tag -l 'v[1-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [[ -z "${LATEST_TAG}" ]]; then
            NEXT_VERSION="1.0.0"
          else
            VERSION="${LATEST_TAG#v}"
            NEXT_VERSION="$(LEVEL="${LEVEL}" VERSION="${VERSION}" node -e '
              const bump = process.env.LEVEL;
              const [major, minor, patch] = process.env.VERSION.split(".").map(Number);
              if (bump === "major") console.log(String(major + 1) + ".0.0");
              else if (bump === "minor") console.log(String(major) + "." + String(minor + 1) + ".0");
              else console.log(String(major) + "." + String(minor) + "." + String(patch + 1));
            ')"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        shell: bash
        run: gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/${IMAGE_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          docker build \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:sha-${GITHUB_SHA::7}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:sha-${GITHUB_SHA::7}"
          docker push "${IMAGE}:latest"
          echo "image=${IMAGE}:${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy service
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ vars.DATABASE_URL }}" || -z "${{ vars.JWT_SECRET }}" ]]; then
            echo "DATABASE_URL and JWT_SECRET GitHub variables must contain Secret Manager secret names."
            exit 1
          fi

          cat > cloudrun-env.yaml <<'EOF'
          NODE_ENV: "production"
          JWT_EXPIRES_IN: "${{ vars.JWT_EXPIRES_IN || '1d' }}"
          CORS_ORIGIN: "${{ vars.CORS_ORIGIN }}"
          FRONTEND_APP_URL: "${{ vars.FRONTEND_APP_URL }}"
          APP_PUBLIC_URL: "${{ vars.APP_PUBLIC_URL || vars.FRONTEND_APP_URL }}"
          GOOGLE_AUTH_ENABLED: "${{ vars.GOOGLE_AUTH_ENABLED || 'false' }}"
          GOOGLE_OAUTH_CLIENT_ID: "${{ vars.GOOGLE_OAUTH_CLIENT_ID }}"
          AUTH_EMAIL_PASSWORD_ENABLED: "${{ vars.AUTH_EMAIL_PASSWORD_ENABLED || 'false' }}"
          AUTH_DEV_EMAIL_LOGIN_ENABLED: "${{ vars.AUTH_DEV_EMAIL_LOGIN_ENABLED || 'false' }}"
          EMAIL_ENABLED: "${{ vars.EMAIL_ENABLED || 'false' }}"
          EMAIL_PROVIDER: "${{ vars.EMAIL_PROVIDER || 'smtp' }}"
          EMAIL_TEST_MODE: "${{ vars.EMAIL_TEST_MODE || 'false' }}"
          EMAIL_FROM_NAME: "${{ vars.EMAIL_FROM_NAME || 'Operación Académica CUN' }}"
          EMAIL_FROM_ADDRESS: "${{ vars.EMAIL_FROM_ADDRESS }}"
          EMAIL_ALLOWED_DOMAIN: "${{ vars.EMAIL_ALLOWED_DOMAIN || 'cun.edu.co' }}"
          EMAIL_BLOCK_LOCAL_RECIPIENTS: "${{ vars.EMAIL_BLOCK_LOCAL_RECIPIENTS || 'true' }}"
          SMTP_PORT: "${{ vars.SMTP_PORT || '465' }}"
          SMTP_SECURE: "${{ vars.SMTP_SECURE || 'true' }}"
          INSTITUTIONAL_WORKFLOW_ENABLED: "${{ vars.INSTITUTIONAL_WORKFLOW_ENABLED || 'true' }}"
          INSTITUTIONAL_FLOW_MODE: "${{ vars.INSTITUTIONAL_FLOW_MODE || 'reduced' }}"
          PRODUCT_ACADEMIC_REVIEW_BUSINESS_DAYS: "${{ vars.PRODUCT_ACADEMIC_REVIEW_BUSINESS_DAYS || '5' }}"
          PRODUCT_RADICATION_BUSINESS_DAYS: "${{ vars.PRODUCT_RADICATION_BUSINESS_DAYS || '5' }}"
          PLANNING_RADICATION_CHECK_BUSINESS_DAYS: "${{ vars.PLANNING_RADICATION_CHECK_BUSINESS_DAYS || '3' }}"
          EOF

          SECRETS_ARG="DATABASE_URL=${{ vars.DATABASE_URL }}:latest,JWT_SECRET=${{ vars.JWT_SECRET }}:latest,C_DIGITAL_USERS_ENCRYPTION_KEY=${{ vars.C_DIGITAL_USERS_ENCRYPTION_KEY || 'producto-c-digital-users-encryption-key' }}:latest"
          if [[ "${{ vars.EMAIL_ENABLED || 'false' }}" == "true" ]]; then
            if [[ -z "${{ vars.EMAIL_HOST }}" || -z "${{ vars.EMAIL_USER }}" || -z "${{ vars.EMAIL_PASSWORD }}" ]]; then
              echo "EMAIL_HOST, EMAIL_USER and EMAIL_PASSWORD GitHub variables must contain Secret Manager secret names when EMAIL_ENABLED=true."
              exit 1
            fi
            SECRETS_ARG="${SECRETS_ARG},EMAIL_HOST=${{ vars.EMAIL_HOST }}:latest,EMAIL_USER=${{ vars.EMAIL_USER }}:latest,EMAIL_PASSWORD=${{ vars.EMAIL_PASSWORD }}:latest"
          fi

          DEPLOY_FLAGS=(
            "--image=${{ steps.image.outputs.image }}"
            "--region=${{ vars.GCP_REGION }}"
            "--project=${{ vars.GCP_PROJECT_ID }}"
            "--platform=managed"
            "--service-account=${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT }}"
            "--port=8080"
            "--timeout=300"
            "--env-vars-file=cloudrun-env.yaml"
            "--set-secrets=${SECRETS_ARG}"
          )
          if [[ -n "${{ vars.CLOUD_SQL_INSTANCE }}" ]]; then
            DEPLOY_FLAGS+=("--add-cloudsql-instances=${{ vars.CLOUD_SQL_INSTANCE }}")
          fi
          gcloud run deploy "${SERVICE_NAME}" "${DEPLOY_FLAGS[@]}"

      - name: Tag release
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
